{% extends "base.html" %}

{% block title %}Admin Login - Whatomate Connect{% endblock %}

{% block styles %}
<style>
    .login-container {
        max-width: 450px;
        margin: 4rem auto;
    }
    
    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-header">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Admin Login</h2>
        <p style="color: #8b949e; margin: 0;">Access the WhatsApp Pending Credentials database.</p>
    </div>

    <div class="premium-card">
        <form method="POST" action="{{ url_for('admin_bp.login', next=request.args.get('next', '')) }}">
            <label for="username">
                Username
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
            </label>

            <label for="password">
                Password
                <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </label>

            <button type="submit" class="btn-premium" style="width: 100%; margin-top: 1rem; padding: 0.75rem 1rem;">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
